<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Libro Interactivo</title>

<style>
    body {
        margin: 0;
        font-family: "Garamond", "Times New Roman", serif;
        background: #1c2b36;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #f5e6c8;
    }

    .portada {
        width: 80%;
        max-width: 850px;
        height: 90vh;
        background: linear-gradient(180deg, #2c4a5f, #1c2b36);
        border: 6px solid #caa85a;
        border-radius: 15px;
        position: relative;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* Ornamentos tipo libro */
    .ornamento {
        position: absolute;
        width: 120px;
        height: 120px;
        border: 4px solid #caa85a;
    }

    .top-left {
        top: 10px;
        left: 10px;
        border-right: none;
        border-bottom: none;
    }

    .top-right {
        top: 10px;
        right: 10px;
        border-left: none;
        border-bottom: none;
    }

    .bottom-left {
        bottom: 10px;
        left: 10px;
        border-right: none;
        border-top: none;
    }

    .bottom-right {
        bottom: 10px;
        right: 10px;
        border-left: none;
        border-top: none;
    }

    h1 {
        font-size: 3em;
        margin-bottom: 40px;
        color: #e6c77b;
        text-align: center;
        letter-spacing: 2px;
    }

    button {
        background: transparent;
        border: 2px solid #caa85a;
        color: #f5e6c8;
        padding: 15px 30px;
        margin: 10px;
        font-size: 1.1em;
        cursor: pointer;
        border-radius: 8px;
        transition: 0.3s;
    }

    button:hover {
        background: #caa85a;
        color: #1c2b36;
    }

</style>
</head>

<body>

<audio id="bg-music" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="portada">

    <div class="ornamento top-left"></div>
    <div class="ornamento top-right"></div>
    <div class="ornamento bottom-left"></div>
    <div class="ornamento bottom-right"></div>

    <h1>Libro Interactivo</h1>

    <button onclick="iniciarHistoria(); reproducirMusica()">Iniciar Historia</button>
<button onclick="releerHistoria()">Releer Última Historia</button>
<button onclick="abrirMusica()">🎵 Música de fondo</button>

</div>

<script>

function abrirMusica(){
    window.open("https://www.youtube.com/watch?v=4Q0Un9PQ0wk", "_blank");
}

function releerHistoria() {
    let historia = sessionStorage.getItem("historia");

    if (!historia) {
        alert("No hay una historia previa en esta sesión.");
        return;
    }

    sessionStorage.setItem("modo", "relectura");
    iniciarHistoria();
}

// VARIABLES GENERALES
let escena = 0;
let ruta = 1;
let historiaTexto = "";
let decisiones = {
    moral: 0,
    control: 0,
    reflexion: 0
};

// ESCENAS
const escenas = [

/* 1 — OBSERVADOR */
{
texto:`Caía ceniza del cielo.

Aren Delvar observaba desde la pasarela superior.

El patio funcionaba.

No perfecto. Nunca perfecto.

Pero sí lo suficiente.

Los skaa trabajaban sin hablar. Sin detenerse. Sin mirar arriba.

Un sistema estable no necesitaba ruido.

Un joven falló al levantar un saco.

El capataz avanzó.

Aren no apartó la mirada.

No era indiferencia.

Era función.`,
opciones:[
{texto:"Mantenerse como observador", cambio:0, tipo:"control", valor:1},
{texto:"Intervenir", cambio:1, tipo:"moral", valor:1}
]
},

/* 2 — PRIMER QUIEBRE */
{
texto: () => (ruta === 1 ?

`El golpe llegó.

El joven cayó.

Aren no se movió.

No porque no pudiera.

Sino porque entendía.

El sistema no se detenía por individuos.

Alterarlo por uno… lo debilitaba todo.`

:

`El golpe llegó.

El joven cayó.

Aren avanzó.

No lo suficiente para detenerlo.

Pero sí para romper algo invisible.

El patrón.

Y eso… el sistema lo notó.`),

opciones:[
{texto:"Aceptar el orden", cambio:0, tipo:"control", valor:1},
{texto:"Cuestionarlo", cambio:1, tipo:"reflexion", valor:1}
]
},

/* 3 — PROCESAMIENTO */
{
texto: () => (decisiones.reflexion > 0 ?

`El cuerpo fue retirado.

Otro ocupó su lugar.

Todo continuó.

Pero Aren no pudo ignorarlo.

No el evento.

El reemplazo.

Demasiado rápido.

Demasiado limpio.

Como si nunca hubiera ocurrido.

Y sin embargo… él lo había visto.`

:

`El cuerpo fue retirado.

Otro ocupó su lugar.

El sistema se ajustó.

Como siempre.

Sin error.

Sin retraso.

Aren volvió a los números.

Era suficiente.`),

opciones:[
{texto:"Analizar lo ocurrido", cambio:1, tipo:"reflexion", valor:1},
{texto:"Descartar la anomalía", cambio:0, tipo:"control", valor:1}
]
},

/* 4 — EL METAL */
{
texto: () => (decisiones.reflexion > 1 ?

`Entonces lo sintió.

No afuera.

Dentro.

Una constante.

Silenciosa.

Pero imposible de ignorar.

No era emoción.

No era error.

Era percepción.`

:

`Entonces lo sintió.

Algo.

Irrelevante.

Innecesario.

Una distracción.

Y como cualquier distracción…

podía ser eliminada.`),

opciones:[
{texto:"Explorar la sensación", cambio:1, tipo:"reflexion", valor:1},
{texto:"Reprimirla", cambio:0, tipo:"control", valor:1}
]
},

/* 5 — PODER */
{
texto: () => (decisiones.control > 1 ?

`El metal respondió.

No completamente.

Pero suficiente.

Un leve movimiento.

Una desviación mínima.

No era imaginación.

Era control.

Y el control… era eficiencia.`

:

`El metal estaba ahí.

Presente.

Pero no sometido.

Aren no lo forzó.

Observó.

Midió.

Esperó.`),

opciones:[
{texto:"Dominarlo", cambio:1, tipo:"control", valor:1},
{texto:"Comprenderlo", cambio:0, tipo:"reflexion", valor:1}
]
},

/* 6 — SALIDA */
{
texto:`El exterior no tenía estructura.

No órdenes.

No supervisión.

Solo espacio.

Y con él…

decisión.`,

opciones:[
{texto:"Alejarse de todo", cambio:0, tipo:"moral", valor:-1},
{texto:"Buscar a alguien", cambio:1, tipo:"moral", valor:1}
]
},

/* 7 — ENCUENTRO */
{
texto: () => (decisiones.moral > 0 ?

`Un hombre herido.

Una niña a su lado.

No gritaba.

No pedía ayuda.

Solo observaba.

Como si supiera que la decisión no era sobre ellos.

Sino sobre él.`

:

`Un hombre herido.

Una niña temblando.

Situación clara.

Riesgo medible.

Resultado predecible.`),

opciones:[
{texto:"Ignorarlos", cambio:0, tipo:"control", valor:1},
{texto:"Ayudarlos", cambio:1, tipo:"moral", valor:1}
]
},

/* 8 — INTERACCIÓN */
{
texto: () => (decisiones.moral > 1 ?

`La niña habló.

"Si te quedas, vendrán."

No había miedo en su voz.

Solo certeza.

Aren entendió:

No necesitaban salvación.

Necesitaban tiempo.`

:

decisiones.control > 2 ?

`Aren no habló.

No era necesario.

Evaluó la herida.

Evaluó el entorno.

Actuó.

Preciso.

Eficiente.

Sin exceso.`

:

`El silencio se extendió.

Nadie tomó control.

La situación permanecía abierta.

Y eso… era peligroso.`),

opciones:[
{texto:"Protegerlos", cambio:1, tipo:"moral", valor:1},
{texto:"Optimizar la situación", cambio:0, tipo:"control", valor:1}
]
},

/* 9 — SOLDADOS */
{
texto: () => (decisiones.moral > 1 ?

`Pasos.

Soldados.

Cerca.

Aren no retrocedió.

No porque creyera ganar.

Sino porque ya había decidido no apartarse.`

:

decisiones.reflexion > 2 ?

`Pasos.

Soldados.

Cerca.

Aren dudó.

Cada opción tenía coste.

Y ninguna era correcta.`

:

`Pasos.

Soldados.

Cerca.

Aren evaluó.

Resultado: conflicto innecesario.

Solución: evitarlo.`),

opciones:[
{texto:"Enfrentarlos", cambio:1, tipo:"moral", valor:1},
{texto:"Retirarse", cambio:0, tipo:"control", valor:1}
]
},

/* 10 — DECISIÓN FINAL */
{
texto: () => (decisiones.moral > 2 ?

`Podía irse.

Pero ya había intervenido.

Ignorar ahora…

no era neutralidad.

Era contradicción.`

:

decisiones.reflexion > 2 ?

`Podía actuar.

O no.

Ambas opciones eran válidas.

Ambas incompletas.

Y eso… lo detenía.`

:

`Podía irse.

Sin consecuencias.

Sin carga.

El sistema seguiría.

Como siempre.`),

opciones:[
{texto:"Regresar al complejo", cambio:1, tipo:"moral", valor:1},
{texto:"Irse definitivamente", cambio:0, tipo:"control", valor:1}
]
},

/* 11 — ÚLTIMA ESCENA */
{
texto:`El patio seguía funcionando.

Como siempre.

Los skaa trabajaban.

El sistema persistía.

Pero Aren… ya no era el mismo.`,
opciones:[
{texto:"Liberarlos", cambio:1, tipo:"moral", valor:1},
{texto:"No intervenir", cambio:0, tipo:"control", valor:1}
]
}

];
// INICIAR HISTORIA (REEMPLAZA LA FUNCIÓN QUE YA TENÍAS)
function iniciarHistoria() {

let modo = sessionStorage.getItem("modo");

// REINICIAR ESTADO
escena = 0;
ruta = 1;
historiaTexto = "";

decisiones = {
    moral: 0,
    control: 0,
    reflexion: 0
};

    // BORRAR PORTADA
    document.body.innerHTML = `
    <div class="portada">
        <div id="texto"></div>
        <div id="opciones"></div>
    </div>
    `;

    // SI ES RELECTURA
    if(modo === "relectura"){

        let historiaGuardada = sessionStorage.getItem("historia");

        document.getElementById("texto").innerHTML = historiaGuardada.replace(/\n/g, "<br>");

        document.getElementById("opciones").innerHTML = `
            <button onclick="location.reload()">Volver al inicio</button>
        `;

        sessionStorage.removeItem("modo");
        return;
    }

    mostrarEscena();
}

// MOSTRAR ESCENA
function mostrarEscena(){

    if(escena >= escenas.length){
        mostrarFinal();
        return;
    }

    let actual = escenas[escena];

    let texto = typeof actual.texto === "function" ? actual.texto() : actual.texto;
document.getElementById("texto").innerHTML = texto.replace(/\n/g, "<br>");

    let botones = "";

    actual.opciones.forEach(op=>{
        botones += `<button onclick="elegir(${op.cambio}, '${op.tipo}', ${op.valor})">${op.texto}</button>`;
    });

    document.getElementById("opciones").innerHTML = botones;
}

// ELECCIÓN
function elegir(cambio, tipo, valor){

    let textoActual = typeof escenas[escena].texto === "function"
    ? escenas[escena].texto()
    : escenas[escena].texto;

historiaTexto += textoActual + "\n";
historiaTexto += "→ Decisión: " + 
    escenas[escena].opciones.find(op => op.valor === valor).texto + "\n\n";

    // Guardar decisiones profundas
    if(tipo && decisiones[tipo] !== undefined){
        decisiones[tipo] += valor;
    }

    // Mantener sistema base
    ruta += cambio === 1 ? 1 : -1;

if(ruta < 1) ruta = 1;
if(ruta > 5) ruta = 5;

    escena++;
    mostrarEscena();
}

// FINAL
function mostrarFinal(){

    let textoFinal = "";
// DECISIÓN FINAL REAL (REEMPLAZA EL SISTEMA ANTIGUO)
if(decisiones.moral >= 3 && decisiones.control <= 0){
    ruta = 1; // Liberador
}
else if(decisiones.moral >= 1){
    ruta = 2; // Ayuda parcial
}
else if(decisiones.reflexion >= 2){
    ruta = 3; // Neutral consciente
}
else if(decisiones.control >= 2){
    ruta = 5; // Sistema / dominador
}
else{
    ruta = 4; // Huida
}

    // FINAL 1 — LIBERADOR
    if(ruta === 1){
        textoFinal = `
        Aren no dudó.

        El sistema ya no era invisible para él.

        Lo entendía.

        Y precisamente por eso… decidió romperlo.

        No con caos.

        Con intención.

        Cada empuje abría espacio.

        Cada movimiento deshacía control.

        Los skaa no recibieron una orden.

        Recibieron una oportunidad.

        Y la tomaron.

        Cuando el patio quedó vacío, Aren no se quedó.

        No era un líder.

        No era un salvador.

        Pero había cambiado algo.

        Y eso… ya no podía deshacerse.
        `;
    }

    // FINAL 2 — AYUDA INCOMPLETA
    else if(ruta === 2){
        textoFinal = `
        Aren actuó.

        No por convicción absoluta.

        Pero tampoco por indiferencia.

        Ayudó.

        Lo suficiente para romper el momento.

        No lo suficiente para cambiarlo todo.

        Algunos escaparon.

        Otros no.

        El sistema se fracturó… pero no cayó.

        Cuando se alejó, no miró atrás.

        No porque no importara.

        Sino porque no sabía si había hecho lo correcto.

        Y esa duda… permaneció.
        `;
    }

    // FINAL 3 — NEUTRO
    else if(ruta === 3){
        textoFinal = `
        Aren se detuvo.

        El conflicto seguía ahí.

        Visible.

        Innegable.

        Pero no actuó.

        No completamente.

        No lo suficiente.

        El sistema continuó.

        Como siempre.

        Ajustándose.

        Absorbiendo cualquier variación.

        Aren se alejó.

        Con la certeza de que había visto algo importante.

        Y la realidad de no haber hecho nada con ello.
        `;
    }

    // FINAL 4 — HUIDA
    else if(ruta === 4){
        textoFinal = `
        Aren eligió irse.

        No mirar atrás.

        No intervenir.

        No involucrarse.

        El sistema siguió funcionando.

        Como si nunca hubiera estado ahí.

        Como si nada hubiera cambiado.

        Y en cierto modo…

        nada lo hizo.

        La bruma lo envolvió.

        Y con el tiempo, incluso el recuerdo perdió forma.

        No por falta de importancia.

        Sino por falta de acción.
        `;
    }

    // FINAL 5 — CAÍDA / SISTEMA
    else if(ruta === 5){
        textoFinal = `
        Aren entendió el sistema.

        Y en lugar de romperlo…

        lo optimizó.

        El poder no lo liberó.

        Lo hizo más eficiente.

        Más preciso.

        Más frío.

        Los errores desaparecieron.

        Las fallas se corrigieron.

        La producción aumentó.

        Y el patio…

        nunca volvió a detenerse.

        Esta vez, bajo su control.

        Perfecto.

        Implacable.

        Irrompible.
        `;
    }

    // GUARDAR HISTORIA
    sessionStorage.setItem("historia", historiaTexto + "\n\n--- FINAL ---\n" + textoFinal);
    sessionStorage.setItem("ruta", ruta);

    document.getElementById("texto").innerHTML = `
        <h2>Final</h2>
        <p>${textoFinal.replace(/\n/g, "<br>")}</p>
        <button onclick="encuesta()">Ir a encuesta</button>
    `;

    document.getElementById("opciones").innerHTML = "";
}

// ENCUESTA
function encuesta(){

    document.body.innerHTML = `
    <div class="portada">
        <h2>Encuesta</h2>
        <p>¿Cómo evalúas tus decisiones?</p>
        <button onclick="resultado(5)">Muy bien</button>
        <button onclick="resultado(3)">Regular</button>
        <button onclick="resultado(1)">Mal</button>
    </div>
    `;
}

// RESULTADO FINAL
function resultado(valor){

    let explicacionRuta = "";

    // =========================
    // PUNTAJE BASE EXIGENTE
    // =========================
    let puntaje = 0;

    // MORAL (menos inflada, exige constancia)
    puntaje += decisiones.moral * 1.0;

    // REFLEXIÓN (clave real del pensamiento)
    puntaje += decisiones.reflexion * 1.4;

    // CONTROL (penalización fuerte)
    puntaje -= decisiones.control * 1.5;


    // =========================
    // PENALIZACIÓN POR INCOHERENCIA
    // =========================

    let incoherencia = Math.abs(decisiones.moral - decisiones.control);

    if(incoherencia <= 1){
        puntaje -= 3; // totalmente contradictorio
    }
    else if(incoherencia <= 3){
        puntaje -= 1.5;
    }

    // Castigo adicional si no hay postura clara
    if(decisiones.moral === 0 && decisiones.reflexion === 0){
        puntaje -= 2;
    }


    // =========================
    // COHERENCIA CON EL FINAL
    // =========================

    if(ruta === 1){ // LIBERADOR
        if(decisiones.moral >= 4 && decisiones.control <= 1){
            puntaje += 2;
            explicacionRuta = "Tu camino fue coherente: actuaste con intención y consistencia moral.";
        } else {
            puntaje -= 2;
            explicacionRuta = "Llegaste a un final moral, pero tus decisiones no fueron lo suficientemente coherentes.";
        }
    }

    else if(ruta === 2){ // INTERMEDIO
        if(decisiones.moral >= 2){
            puntaje += 0.5;
            explicacionRuta = "Intentaste actuar correctamente, pero con dudas o inconsistencias.";
        } else {
            puntaje -= 1;
            explicacionRuta = "Tus decisiones no sostienen el resultado que alcanzaste.";
        }
    }

    else if(ruta === 3){ // NEUTRAL
        if(decisiones.reflexion >= 2){
            puntaje += 0;
            explicacionRuta = "Comprendiste el conflicto, pero evitaste actuar con claridad.";
        } else {
            puntaje -= 1.5;
            explicacionRuta = "La neutralidad fue más pasividad que comprensión.";
        }
    }

    else if(ruta === 4){ // HUIDA
        puntaje -= 2.5;
        explicacionRuta = "Evitaste el conflicto. No hay construcción de decisión real.";
    }

    else if(ruta === 5){ // SISTEMA
        if(decisiones.control >= 3){
            puntaje -= 1.5;
            explicacionRuta = "Fuiste coherente, pero priorizaste el control sobre lo humano.";
        } else {
            puntaje -= 3;
            explicacionRuta = "El resultado refleja incoherencia y falta de criterio claro.";
        }
    }


    // =========================
    // NORMALIZACIÓN MÁS DURA
    // =========================

    let notaBase = 2 + (puntaje / 5);

    if(notaBase > 5) notaBase = 5;
    if(notaBase < 1) notaBase = 1;


    // =========================
    // AUTOEVALUACIÓN (MENOR PESO)
    // =========================

    let ajuste = 0;

    if(valor === 5){
        ajuste = 0.2;
    }
    else if(valor === 3){
        ajuste = 0;
    }
    else if(valor === 1){
        ajuste = -0.4;
    }

    let notaFinal = (notaBase + ajuste).toFixed(1);


    // =========================
    // EXPLICACIÓN DE ENCUESTA
    // =========================

    let explicacionEncuesta = "";

    if(valor === 5){
        explicacionEncuesta = "Tu percepción es alta, pero la evaluación exige coherencia real en decisiones.";
    }
    else if(valor === 3){
        explicacionEncuesta = "Tu autoevaluación es moderada, pero el sistema exige mayor claridad.";
    }
    else if(valor === 1){
        explicacionEncuesta = "Percibes fallas, lo cual coincide con una toma de decisiones débil.";
    }


    // =========================
    // RESULTADO FINAL
    // =========================

    document.body.innerHTML = `
    <div style="background:white; color:black; height:100vh; display:flex; justify-content:space-between; align-items:center; padding:60px;">

        <div style="max-width:500px;">
            <h2>Evaluación</h2>
            <p><strong>Desempeño en la historia:</strong> ${explicacionRuta}</p>
            <p><strong>Reflexión del estudiante:</strong> ${explicacionEncuesta}</p>
            <p><strong>Decisiones tomadas:</strong> Moral (${decisiones.moral}), Reflexión (${decisiones.reflexion}), Control (${decisiones.control})</p>
            <p>La nota exige coherencia, constancia y criterio en la toma de decisiones.</p>
        </div>

        <div style="display:flex; flex-direction:column; align-items:center;">

    <div style="font-size:80px; font-weight:bold; margin-bottom:30px;">
        ${notaFinal}
    </div>

    <button onclick="window.open('https://www.youtube.com/watch?v=lzDaBQP5V1o', '_blank')">
        📖 Mejorar comprensión lectora
    </button>

    <button onclick="window.open('https://www.youtube.com/watch?v=ESJh-miB5j8', '_blank')">
        🧠 Cómo tomar mejores decisiones
    </button>

</div>

    </div>
    `;
}

function reproducirMusica() {
    const audio = document.getElementById("bg-music");
    audio.volume = 0.4; // volumen (0 a 1)
    audio.play();
}

</script>

</body>
</html>
